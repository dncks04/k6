name: CI with Load Testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # 1단계: 단위 테스트 
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 의존성 설치
        run: npm ci

      - name: 단위 테스트 실행
        run: npm test

  # 2단계: k6 부하테스트 
  load-test:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 의존성 설치
        run: npm ci

      - name: 서버 백그라운드 실행
        run: npm start &

      - name: 서버 준비 대기
        run: sleep 5

      - name: k6 설치
        uses: grafana/setup-k6-action@v1

      - name: k6 부하테스트 실행
        run: k6 run load-test.js